version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"

  api-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - product-service
      - order-service
      - user-service
    volumes:
      - ./k8s/apps/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"

  order-service:
    build: ./services/order-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      PORT: 4020
    ports:
      - "4020:4020"
    depends_on:
      - mysql

  product-service:
    build: ./services/product-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - mysql

  user-service:
    build: ./services/user-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4010
    ports:
      - "4010:4010"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
      - order-service
      - product-service
      - user-service

volumes:
  mysql-data:
    name: argocd_mysql_data
