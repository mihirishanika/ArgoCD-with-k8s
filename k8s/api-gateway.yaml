apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-nginx-config
data:
  default.conf: |
    server {
      listen 8080;

      location /products {
        proxy_pass http://product-service:4000;
      }

      location /orders {
        proxy_pass http://product-service:4000;
      }

      location /search {
        proxy_pass http://product-service:4000;
      }

      location /register {
        proxy_pass http://user-service:4010;
      }

      location /login {
        proxy_pass http://user-service:4010;
      }

      location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: api-gateway-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
