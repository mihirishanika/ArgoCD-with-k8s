server {
  listen 8080;

  location /products {
    proxy_pass http://product-service:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /orders {
    proxy_pass http://order-service:4020;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /users/ {
    proxy_pass http://user-service:4010/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /users/register {
    proxy_pass http://user-service:4010/register;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /users/login {
    proxy_pass http://user-service:4010/login;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}