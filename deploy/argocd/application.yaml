apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mini-shop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_USER/YOUR_REPO.git' # REPLACE with your Git repo
    targetRevision: HEAD
    path: '.'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
